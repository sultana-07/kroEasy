<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E3A8A" />
  <meta name="description"
    content="KroEasy – Apne Shehar Ki Har Service. Find trusted labour and car services in your city." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KroEasy" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png" />
  <title>KroEasy – Apne Shehar Ki Har Service</title>

  <!-- Splash screen styles — renders INSTANTLY before JS loads -->
  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #0F172A 0%, #1E3A8A 50%, #2563EB 100%);
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    #splash-logo {
      font-size: 52px;
      animation: splash-bounce 1s ease-in-out;
    }

    #splash-name {
      font-size: 34px;
      font-weight: 900;
      color: white;
      letter-spacing: -0.5px;
      margin-top: 8px;
      opacity: 0;
      animation: splash-fade-up 0.6s ease forwards 0.3s;
    }

    #splash-tagline {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 6px;
      opacity: 0;
      animation: splash-fade-up 0.6s ease forwards 0.5s;
    }

    #splash-loader {
      margin-top: 32px;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #F97316;
      border-radius: 50%;
      opacity: 0;
      animation: splash-spin 0.8s linear infinite, splash-fade-up 0.4s ease forwards 0.7s;
    }

    @keyframes splash-bounce {
      0% {
        transform: scale(0.3) rotate(-10deg);
        opacity: 0;
      }

      50% {
        transform: scale(1.15) rotate(3deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    @keyframes splash-fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes splash-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Splash screen — shows instantly before React loads -->
  <div id="splash-screen">
    <div id="splash-logo">⚡</div>
    <div id="splash-name">KroEasy</div>
    <div id="splash-tagline">Apna Kaam, Easy Kaam</div>
    <div id="splash-loader"></div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
